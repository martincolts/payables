name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: payables
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d payables"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/payables
      JWT_SECRET: ci-test-secret
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Repository tests
        working-directory: apps/backend
        run: pnpm exec vitest run src/repositories

      - name: Integration tests
        working-directory: apps/backend
        run: pnpm exec vitest run src/integration
