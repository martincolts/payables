services:
  postgres:
    image: postgres:18-alpine
    container_name: payables-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-payables}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-payables}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: payables-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8080
      # Built from POSTGRES_* so there's a single source of truth.
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-payables}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      # Same-origin in production (nginx proxies /api), so CORS isn't needed,
      # but the backend's config schema requires the var to be present.
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: payables-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend

  tailscale:
    image: tailscale/tailscale:latest
    container_name: payables-tailscale
    restart: unless-stopped
    # Stable public HTTPS URL via Tailscale Funnel:
    #   https://${TS_HOSTNAME}.<your-tailnet>.ts.net
    # Unlike a Cloudflare Quick Tunnel, this URL does NOT change on restart —
    # it's derived from the device hostname + your tailnet, and the device
    # identity is persisted in the tailscale_state volume.
    hostname: ${TS_HOSTNAME:-payables}
    environment:
      # Reusable auth key from the Tailscale admin console (Settings → Keys).
      TS_AUTHKEY: ${TS_AUTHKEY:?TS_AUTHKEY must be set — see DEPLOY.md}
      TS_STATE_DIR: /var/lib/tailscale
      # Declarative Funnel: serve frontend:80 on the public 443 funnel.
      TS_SERVE_CONFIG: /config/funnel.json
      TS_USERSPACE: "false"
    volumes:
      - tailscale_state:/var/lib/tailscale
      - ./tailscale/funnel.json:/config/funnel.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    depends_on:
      - frontend

volumes:
  postgres_data:
  tailscale_state:
